name: Wasm Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive  # <--- MUST BE HERE to pull the code

      - name: Install Build Dependencies
        run: |                       #ri niouhn
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libuv1-dev libssl-dev 

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Build XMR-Wasm
        run: |
          # 1. THE NUCLEAR PATCH: Overwrite the crashing file with Wasm-safe C++
          cat <<EOF > src/backend/cpu/platform/BasicCpuInfo.cpp
          #include "backend/cpu/platform/BasicCpuInfo.h"
          namespace xmrig {
          BasicCpuInfo::BasicCpuInfo() :
              m_backend(nullptr),
              m_nodes(1),
              m_packages(1),
              m_cores(1),
              m_threads(1),
              m_l2(0),
              m_l3(0),
              m_hasRDRAND(false)
          {}
          void BasicCpuInfo::jpm() {}
          }
          EOF

          # 2. CLEANUP HARDWARE FLAGS
          find . -type f -name "*.cmake" -exec sed -i 's/-maes//g' {} +
          find . -type f -name "CMakeLists.txt" -exec sed -i 's/-maes//g' {} +
          sed -i '254,258s/^/#/' CMakeLists.txt
          
          # 3. BUILD DEPENDENCIES
          cd scripts && ./build_deps.sh && cd ..
          
          mkdir -p build && cd build
          
          # 4. RUN CONFIGURATION
          emcmake cmake .. \
            -DXMRIG_WASM=ON \
            -DWITH_GHOSTRIDER=OFF \
            -DWITH_OPENCL=OFF \
            -DWITH_CUDA=OFF \
            -DWITH_SOFT_AES=ON \
            -DSOFT_AES=ON \
            -DWITH_HWLOC=OFF \
            -DWITH_LIBCPUID=OFF \
            -DWITH_HTTPD=OFF \
            -DWITH_TLS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DUV_INCLUDE_DIR=../scripts/deps/include \
            -DUV_LIBRARY=../scripts/deps/lib/libuv.a
            
          # 5. COMPILATION
          emmake make -j$(nproc)
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: wasm-payload
          path: |
            build/xmrig.js
            build/xmrig.wasm  