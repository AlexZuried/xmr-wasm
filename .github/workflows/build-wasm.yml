name: Wasm Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive  # <--- MUST BE HERE to pull the code

      - name: Install Build Dependencies
        run: |                       #ri niouhn
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libuv1-dev libssl-dev 

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Build XMR-Wasm
        run: |
          # 1. KILL INSTRUCTION CACHE (Fixes 76% crash)
          # We make the flush function a 'no-op' because Wasm doesn't have a cache to flush.
          sed -i 's/vmsize_t size)/vmsize_t size) { return; } \/\/ /' src/crypto/common/VirtualMemory_unix.cpp

          # 2. FORCE GENERIC CRYPTO (Kill x86 Intrinsics)
          # We find every place that tries to include x86/SSE headers and comment it out.
          find . -type f -name "*.h" -o -name "*.cpp" | xargs sed -i 's/#include <x86intrin.h>/\/\/ stripped/g'
          find . -type f -name "*.h" -o -name "*.cpp" | xargs sed -i 's/#include <immintrin.h>/\/\/ stripped/g'
          find . -type f -name "*.h" -o -name "*.cpp" | xargs sed -i 's/#include <cpuid.h>/\/\/ stripped/g'

          # 3. OVERWRITE BasicCpuInfo (Keep our previous working fix)
          cat <<EOF > src/backend/cpu/platform/BasicCpuInfo.cpp
          #include "backend/cpu/platform/BasicCpuInfo.h"
          namespace xmrig { BasicCpuInfo::BasicCpuInfo() {} }
          EOF

          # 4. TARGET CRASH FIX
          sed -i '254,258s/^/#/' CMakeLists.txt
          
          # 5. BUILD DEPENDENCIES
          cd scripts && ./build_deps.sh && cd ..
          
          # 6. CONFIGURE & BUILD
          # -DARM_TARGET=ON is the secret sauce to avoid x86 assembly entirely
          mkdir -p build && cd build
          emcmake cmake .. \
            -DXMRIG_WASM=ON \
            -DARM_TARGET=ON \
            -DWITH_GHOSTRIDER=OFF \
            -DWITH_OPENCL=OFF \
            -DWITH_CUDA=OFF \
            -DWITH_SOFT_AES=ON \
            -DSOFT_AES=ON \
            -DWITH_HWLOC=OFF \
            -DWITH_LIBCPUID=OFF \
            -DWITH_HTTPD=OFF \
            -DWITH_TLS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DUV_INCLUDE_DIR=../scripts/deps/include \
            -DUV_LIBRARY=../scripts/deps/lib/libuv.a
            
          emmake make -j$(nproc)
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: wasm-payload
          path: |
            build/xmrig.js
            build/xmrig.wasm  