name: Wasm Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive  # <--- MUST BE HERE to pull the code

      - name: Install Build Dependencies
        run: |                       #ri niouhn
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libuv1-dev libssl-dev 

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Build XMR-Wasm
        run: |
          # 1. CLEAN START
          git reset --hard
          
          # 2. THE COMPATIBILITY BRIDGE (Header Injection)
          # We define x86-specific intrinsics as safe NOPs or constants
          # so the compiler doesn't choke on hardware-specific code.
          cat << 'EOF' > wasm_compat.h
          #pragma once
          #include <stdint.h>
          #define __builtin___clear_cache(start, end)
          static inline uint32_t __builtin_ia32_readeflags_u32() { return 0; }
          #define __builtin_ia32_writeeflags_u32(x) ((void)0)
          #define __builtin_ia32_crc32qi(a, b) (0)
          #define __builtin_ia32_crc32hi(a, b) (0)
          #define __builtin_ia32_crc32si(a, b) (0)
          #define __builtin_ia32_rdpmc(x) (0)
          #define __builtin_ia32_rdtscp(x) (0)
          #define __builtin_ia32_wbinvd() ((void)0)
          EOF

          # 3. BUILD DEPENDENCIES (Isolated Subshell)
          (
            cd scripts
            ./build_deps.sh
          )

          # 4. ENVIRONMENT DEFINITION
          # We use -msimd128 to leverage Wasm's native 128-bit vector instructions.
          export COMPAT_FLAGS="-msimd128 -msse4.1 -include $(pwd)/wasm_compat.h"
          export CFLAGS="$COMPAT_FLAGS"
          export CXXFLAGS="$COMPAT_FLAGS"
          
          # 5. CONFIGURATION & LINKAGE
          # -DWITH_ASM=OFF is the "Pro" way to force the C++ path.
          # -DBUILD_BENCHMARK=OFF ensures CMake focuses solely on the 'xmrig' target.
          mkdir -p build && cd build
          emcmake cmake .. \
            -DXMRIG_WASM=ON \
            -DWITH_SOFT_AES=ON \
            -DSOFT_AES=ON \
            -DWITH_ASM=OFF \
            -DBUILD_BENCHMARK=OFF \
            -DWITH_HWLOC=OFF \
            -DWITH_LIBCPUID=OFF \
            -DWITH_OPENCL=OFF \
            -DWITH_CUDA=OFF \
            -DWITH_HTTPD=OFF \
            -DWITH_TLS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DUV_INCLUDE_DIR=../scripts/deps/include \
            -DUV_LIBRARY=../scripts/deps/lib/libuv.a
            
          # 6. FINAL COMPILE
          emmake make -j$(nproc)
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: wasm-payload
          path: |
            build/xmrig.js
            build/xmrig.wasm  