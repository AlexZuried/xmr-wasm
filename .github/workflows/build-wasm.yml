name: Wasm Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive  # <--- MUST BE HERE to pull the code

      - name: Install Build Dependencies
        run: |                       #ri niouhn
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libuv1-dev libssl-dev 

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Build XMR-Wasm
        run: |
          sudo apt-get update
          sudo apt-get install -y libuv1-dev
          
          # 1. REMOVE HARDWARE FLAGS: WebAssembly is a virtual CPU; it hates -maes
          sed -i 's/-maes//g' CMakeLists.txt
          sed -i 's/-msse2//g' CMakeLists.txt
          
          # 2. FIX THE TARGET ERROR: Prevents the "No TARGET xmrig" crash
          sed -i 's/add_custom_command(TARGET xmrig/add_custom_command(OUTPUT xmrig.js/g' CMakeLists.txt || true
          
          mkdir -p build && cd build
          
          # 3. FORCE SOFTWARE MODE: This is the secret to browser mining
          emcmake cmake .. \
            -DWITH_SOFT_AES=ON \
            -DSOFT_AES=ON \
            -DWITH_HWLOC=OFF \
            -DWITH_LIBCPUID=OFF \
            -DWITH_HTTPD=OFF \
            -DWITH_TLS=OFF \
            -DWITH_ADL=OFF \
            -DWITH_NVML=OFF \
            -DWITH_OPENCL=OFF \
            -DWITH_CUDA=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DUV_INCLUDE_DIR=/usr/include \
            -DUV_LIBRARY=/usr/lib/x86_64-linux-gnu/libuv.so
            
          emmake make -j$(nproc)
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: wasm-payload
          path: |
            build/xmrig.js
            build/xmrig.wasm  