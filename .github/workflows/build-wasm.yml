name: Wasm Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive  # <--- MUST BE HERE to pull the code

      - name: Install Build Dependencies
        run: |                       #ri niouhn
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libuv1-dev libssl-dev 

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Build XMR-Wasm
        run: |
          # 1. CLEANUP: Deep clean hardware flags and fix the Target crash
          find . -type f -name "*.cmake" -exec sed -i 's/-maes//g' {} +
          find . -type f -name "CMakeLists.txt" -exec sed -i 's/-maes//g' {} +
          sed -i '254,258s/^/#/' CMakeLists.txt
          
          mkdir -p build && cd build
          
          # 2. THE FIX: Remove the /usr/include paths. 
          # We need to use the internal XMRig UV or let Emscripten handle it.
          emcmake cmake .. \
            -DXMRIG_WASM=ON \
            -DWITH_GHOSTRIDER=OFF \
            -DWITH_OPENCL=OFF \
            -DWITH_CUDA=OFF \
            -DWITH_SOFT_AES=ON \
            -DSOFT_AES=ON \
            -DWITH_HWLOC=OFF \
            -DWITH_LIBCPUID=OFF \
            -DWITH_HTTPD=OFF \
            -DWITH_TLS=OFF \
            -DCMAKE_BUILD_TYPE=Release
            
          # 3. COMPILATION
          emmake make -j$(nproc)
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: wasm-payload
          path: |
            build/xmrig.js
            build/xmrig.wasm  