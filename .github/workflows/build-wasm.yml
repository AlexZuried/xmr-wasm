name: Wasm Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive  # <--- MUST BE HERE to pull the code

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libuv1-dev libssl-dev

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Build XMR-Wasm
        run: |
          # 1. Find where the heck the project file is
          echo "--- Searching for CMakeLists.txt ---"
          find . -name "CMakeLists.txt"
          
          # 2. Get the path dynamically
          PROJECT_PATH=$(find . -name "CMakeLists.txt" -printf '%h\n' | head -n 1)
          
          if [ -z "$PROJECT_PATH" ]; then
            echo "ERROR: Still no CMakeLists.txt found. Your fork might be empty."
            exit 1
          fi
          
          echo "Found project in: $PROJECT_PATH"
          
          # 3. Build from that path
          mkdir -p build && cd build
          emcmake cmake "$GITHUB_WORKSPACE/$PROJECT_PATH" \
            -DXMRIG_WASM=ON \
            -DWITH_HTTPD=OFF \
            -DWITH_TLS=OFF \
            -DWITH_ADL=OFF \
            -DWITH_NVML=OFF \
            -DWITH_OPENCL=OFF \
            -DWITH_CUDA=OFF \
            -DCMAKE_BUILD_TYPE=Release
          emmake make -j2
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: wasm-payload
          path: |
            build/xmrig.js
            build/xmrig.wasm