name: Wasm Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive  # <--- MUST BE HERE to pull the code

      - name: Install Build Dependencies
        run: |                       #ri niouhn
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libuv1-dev libssl-dev 

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Build XMR-Wasm
        run: |
          # 1. RESET REPOSITORY
          # Wipe out all previous sed hacks and start with pristine source code.
          git reset --hard
          
          # 2. CREATE THE COMPILER POLYFILL
          # This safely mocks the OS-level x86 instructions that don't exist in WebAssembly,
          # allowing the compiler to parse the files without stripping the actual hash logic.
          cat << 'EOF' > wasm_compat.h
          #pragma once
          // Wasm has no physical instruction cache to flush
          #define __builtin___clear_cache(start, end)
          // Mock missing x86 hardware/system builtins
          #define __builtin_ia32_readeflags_u32() 0
          #define __builtin_ia32_writeeflags_u32(x)
          #define __builtin_ia32_crc32qi(a, b) 0
          #define __builtin_ia32_crc32hi(a, b) 0
          #define __builtin_ia32_crc32si(a, b) 0
          #define __builtin_ia32_rdpmc(x) 0
          #define __builtin_ia32_rdtscp(x) 0
          #define __builtin_ia32_wbinvd()
          EOF

          # 3. SET COMPILER NATIVE ENVIRONMENT
          # -msimd128 & -msse*: Instructs Emscripten to seamlessly translate x86 SSE into Wasm.
          # -include: Injects our polyfill into every file automatically before compilation.
          export CFLAGS="-msimd128 -msse -msse2 -msse3 -mssse3 -msse4.1 -include $(pwd)/wasm_compat.h"
          export CXXFLAGS="-msimd128 -msse -msse2 -msse3 -mssse3 -msse4.1 -include $(pwd)/wasm_compat.h"
          
          # 4. BUILD DEPENDENCIES
          cd scripts && ./build_deps.sh && cd ..
          
          # 5. CONFIGURE & BUILD
          # Clean build. No hacks. We use SOFT_AES to ensure cross-browser compatibility.
          mkdir -p build && cd build
          emcmake cmake .. \
            -DXMRIG_WASM=ON \
            -DWITH_SOFT_AES=ON \
            -DSOFT_AES=ON \
            -DWITH_HWLOC=OFF \
            -DWITH_LIBCPUID=OFF \
            -DWITH_OPENCL=OFF \
            -DWITH_CUDA=OFF \
            -DWITH_HTTPD=OFF \
            -DWITH_TLS=OFF \
            -DBUILD_STATIC=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DUV_INCLUDE_DIR=../scripts/deps/include \
            -DUV_LIBRARY=../scripts/deps/lib/libuv.a
            
          emmake make -j$(nproc)
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: wasm-payload
          path: |
            build/xmrig.js
            build/xmrig.wasm  