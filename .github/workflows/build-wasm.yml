name: Wasm Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive  # <--- MUST BE HERE to pull the code

      - name: Install Build Dependencies
        run: |                       #ri niouhn
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libuv1-dev libssl-dev 

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Build XMR-Wasm
        run: |
          # 1. PRE-BUILD PATCH
          # Fix the Target crash in CMakeLists
          sed -i '254,258s/^/#/' CMakeLists.txt
          
          # 2. BUILD DEPENDENCIES
          # This script often re-triggers hardware detection, so we run it early
          cd scripts && ./build_deps.sh && cd ..
          
          # 3. THE UNIVERSAL STRIPPER (The "Pro" Fix)
          # We search EVERY file (source, cmake, and generated makefiles) 
          # and rip out all x86 hardware flags.
          find . -type f -exec sed -i 's/-maes//g' {} +
          find . -type f -exec sed -i 's/-msse4.1//g' {} +
          find . -type f -name "*.cpp" -o -name "*.h" | xargs sed -i 's/#include <cpuid.h>/\/\/ no-cpuid/g'
          
          mkdir -p build && cd build
          
          # 4. RUN CONFIGURATION
          # We use -DARM_TARGET=ON as a trick; it forces XMRig to skip x86-specific code
          emcmake cmake .. \
            -DXMRIG_WASM=ON \
            -DARM_TARGET=ON \
            -DWITH_GHOSTRIDER=OFF \
            -DWITH_OPENCL=OFF \
            -DWITH_CUDA=OFF \
            -DSOFT_AES=ON \
            -DWITH_HWLOC=OFF \
            -DWITH_LIBCPUID=OFF \
            -DWITH_HTTPD=OFF \
            -DWITH_TLS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DUV_INCLUDE_DIR=../scripts/deps/include \
            -DUV_LIBRARY=../scripts/deps/lib/libuv.a
            
          # 5. FINAL COMPILATION
          emmake make -j$(nproc)
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: wasm-payload
          path: |
            build/xmrig.js
            build/xmrig.wasm  