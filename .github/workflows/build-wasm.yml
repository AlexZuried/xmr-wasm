name: Wasm Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive  # <--- MUST BE HERE to pull the code

      - name: Install Build Dependencies
        run: |                       #ri niouhn
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libuv1-dev libssl-dev 

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Build XMR-Wasm
        run: |
          # 1. ARCHITECTURE BLINDFOLD (The 77% Fix)
          # We force the x86 header to be empty so it can't pull in forbidden intrinsics.
          echo "// Stripped for WASM" > src/crypto/cn/CryptoNight_x86.h
          
          # 2. VIRTUAL MEMORY SNIPE (The 76% Fix)
          # Re-applying the fix for VirtualMemory without breaking headers.
          sed -i '/void VirtualMemory::flushInstructionCache/,/}/ { /^{/ a return;
          }' src/crypto/common/VirtualMemory_unix.cpp

          # 3. GLOBAL STRIP OF HARDWARE HEADERS
          # We search for and comment out includes that pull in x86-specific code.
          find . -type f -name "*.cpp" -o -name "*.h" | xargs sed -i 's/#include <x86intrin.h>/\/\/ stripped/g'
          find . -type f -name "*.cpp" -o -name "*.h" | xargs sed -i 's/#include <ia32intrin.h>/\/\/ stripped/g'
          find . -type f -name "*.cpp" -o -name "*.h" | xargs sed -i 's/#include <immintrin.h>/\/\/ stripped/g'
          find . -type f -name "*.cpp" -o -name "*.h" | xargs sed -i 's/#include <cpuid.h>/\/\/ stripped/g'
          
          # 4. FIX BasicCpuInfo
          cat <<EOF > src/backend/cpu/platform/BasicCpuInfo.cpp
          #include "backend/cpu/platform/BasicCpuInfo.h"
          namespace xmrig { BasicCpuInfo::BasicCpuInfo() {} }
          EOF

          # 5. BUILD DEPENDENCIES
          cd scripts && ./build_deps.sh && cd ..
          
          # 6. CONFIGURE & BUILD (Added -DXMRIG_ALGO_KAWPOW=OFF for faster/easier WASM build)
          mkdir -p build && cd build
          emcmake cmake .. \
            -DXMRIG_WASM=ON \
            -DARM_TARGET=ON \
            -DWITH_GHOSTRIDER=OFF \
            -DWITH_OPENCL=OFF \
            -DWITH_CUDA=OFF \
            -DWITH_SOFT_AES=ON \
            -DSOFT_AES=ON \
            -DWITH_HWLOC=OFF \
            -DWITH_LIBCPUID=OFF \
            -DWITH_HTTPD=OFF \
            -DWITH_TLS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DUV_INCLUDE_DIR=../scripts/deps/include \
            -DUV_LIBRARY=../scripts/deps/lib/libuv.a
            
          emmake make -j$(nproc)
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: wasm-payload
          path: |
            build/xmrig.js
            build/xmrig.wasm  