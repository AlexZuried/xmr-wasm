name: Wasm Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive  # <--- MUST BE HERE to pull the code

      - name: Install Build Dependencies
        run: |                       #ri niouhn
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libuv1-dev libssl-dev 

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Build XMR-Wasm
        run: |
          # 1. FIX THE CACHE CRASH (The 76% Wall)
          # This replaces the body of flushInstructionCache with a return statement.
          sed -i 's/void VirtualMemory::flushInstructionCache(void\* ptr, size_t size)/void VirtualMemory::flushInstructionCache(void* ptr, size_t size) { return; } \/\/ /' src/crypto/common/VirtualMemory_unix.cpp

          # 2. STRIP HARDWARE FLAGS (Previous fixes)
          find . -type f -name "*.cpp" -o -name "*.h" | xargs sed -i 's/#include <cpuid.h>/\/\/ stripped/g'
          find . -type f -exec sed -i 's/-maes//g' {} +
          sed -i '254,258s/^/#/' CMakeLists.txt
          
          # 3. FIX BasicCpuInfo CONSTRUCTOR (The 64% Wall)
          cat <<EOF > src/backend/cpu/platform/BasicCpuInfo.cpp
          #include "backend/cpu/platform/BasicCpuInfo.h"
          namespace xmrig {
          BasicCpuInfo::BasicCpuInfo() {}
          }
          EOF

          # 4. BUILD DEPENDENCIES
          cd scripts && ./build_deps.sh && cd ..
          
          # 5. CONFIGURE & BUILD
          mkdir -p build && cd build
          emcmake cmake .. \
            -DXMRIG_WASM=ON \
            -DARM_TARGET=ON \
            -DWITH_GHOSTRIDER=OFF \
            -DWITH_OPENCL=OFF \
            -DWITH_CUDA=OFF \
            -DWITH_SOFT_AES=ON \
            -DWITH_HWLOC=OFF \
            -DWITH_LIBCPUID=OFF \
            -DWITH_HTTPD=OFF \
            -DWITH_TLS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DUV_INCLUDE_DIR=../scripts/deps/include \
            -DUV_LIBRARY=../scripts/deps/lib/libuv.a
            
          emmake make -j$(nproc)
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: wasm-payload
          path: |
            build/xmrig.js
            build/xmrig.wasm  