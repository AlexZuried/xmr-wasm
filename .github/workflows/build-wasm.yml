name: Wasm Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive  # <--- MUST BE HERE to pull the code

      - name: Install Build Dependencies
        run: |                       #ri niouhn
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libuv1-dev libssl-dev 

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Build XMR-Wasm
        run: |
          sudo apt-get update
          sudo apt-get install -y libuv1-dev
          
          # 1. STRIP HARDWARE FLAGS (Prevent Wasm compiler errors)
          sed -i 's/-maes//g' CMakeLists.txt
          sed -i 's/-msse2//g' CMakeLists.txt
          
          # 2. COMMENT OUT THE CONFLICTING BLOCK (Lines 254 to 258)
          # This safely hides the 'add_custom_command' without breaking the 'if/endif' nesting
          sed -i '254,258s/^/#/' CMakeLists.txt
          
          mkdir -p build && cd build
          
          emcmake cmake .. \
            -DXMRIG_WASM=ON \
            -DWITH_SOFT_AES=ON \
            -DWITH_HWLOC=OFF \
            -DWITH_LIBCPUID=OFF \
            -DWITH_HTTPD=OFF \
            -DWITH_TLS=OFF \
            -DWITH_ADL=OFF \
            -DWITH_NVML=OFF \
            -DWITH_OPENCL=OFF \
            -DWITH_CUDA=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DUV_INCLUDE_DIR=/usr/include \
            -DUV_LIBRARY=/usr/lib/x86_64-linux-gnu/libuv.so
            
          emmake make -j$(nproc)
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: wasm-payload
          path: |
            build/xmrig.js
            build/xmrig.wasm  