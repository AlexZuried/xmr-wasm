name: Wasm Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive  # <--- MUST BE HERE to pull the code

      - name: Install Build Dependencies
        run: |                       #ri niouhn
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libuv1-dev libssl-dev 

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Build XMR-Wasm
        run: |
          # 1. KILL X86 GLOBALLY: Force the project to believe it is NOT on x86
          # We search for any mention of x86/x64 and replace it with a dummy string
          find . -type f -name "*.h" -o -name "*.cpp" -o -name "*.cmake" | xargs sed -i 's/__x86_64__/DISABLED_ARCH/g'
          find . -type f -name "*.h" -o -name "*.cpp" -o -name "*.cmake" | xargs sed -i 's/__i386__/DISABLED_ARCH/g'
          
          # 2. STRIP ASSEMBLER: Remove the 'cpuid' and 'xgetbv' calls from the entire source
          # If the compiler can't see 'asm' or 'cpuid', it can't error on them.
          find src/backend/cpu -type f -name "*.cpp" -exec sed -i 's/__cpuid/\/\/ removed/g' {} +
          find src/backend/cpu -type f -name "*.cpp" -exec sed -i 's/__asm__/\/\/ removed/g' {} +
          find src/backend/cpu -type f -name "*.cpp" -exec sed -i 's/#include <cpuid.h>/\/\/ removed/g' {} +

          # 3. FIX TARGET CRASH (Line 254-258)
          sed -i '254,258s/^/#/' CMakeLists.txt
          
          # 4. BUILD DEPENDENCIES
          cd scripts && ./build_deps.sh && cd ..
          
          mkdir -p build && cd build
          
          # 5. RUN CONFIGURATION (Strict isolation)
          emcmake cmake .. \
            -DXMRIG_WASM=ON \
            -DXMRIG_OS_WASM=ON \
            -DWITH_GHOSTRIDER=OFF \
            -DWITH_OPENCL=OFF \
            -DWITH_CUDA=OFF \
            -DWITH_SOFT_AES=ON \
            -DSOFT_AES=ON \
            -DWITH_HWLOC=OFF \
            -DWITH_LIBCPUID=OFF \
            -DWITH_HTTPD=OFF \
            -DWITH_TLS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DUV_INCLUDE_DIR=../scripts/deps/include \
            -DUV_LIBRARY=../scripts/deps/lib/libuv.a
            
          # 6. COMPILATION
          emmake make -j$(nproc)
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: wasm-payload
          path: |
            build/xmrig.js
            build/xmrig.wasm  