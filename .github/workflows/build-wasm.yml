name: Wasm Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive  # <--- MUST BE HERE to pull the code

      - name: Install Build Dependencies
        run: |                       #ri niouhn
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libuv1-dev libssl-dev 

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Build XMR-Wasm
        run: |
          sudo apt-get update
          sudo apt-get install -y libuv1-dev
          
          # 1. THE DEEP CLEAN: Remove -maes from EVERY file in the project
          # This finds all files and replaces -maes with nothing
          find . -type f -name "*.cmake" -exec sed -i 's/-maes//g' {} +
          find . -type f -name "CMakeLists.txt" -exec sed -i 's/-maes//g' {} +
          
          # 2. FIX NESTING: Comment out the problematic block again
          sed -i '254,258s/^/#/' CMakeLists.txt
          
          mkdir -p build && cd build
          
          # 3. FORCE SOFT AES: Tell XMRig to use C++ math instead of Hardware
          emcmake cmake .. \
            -DXMRIG_WASM=ON \
            -DWITH_SOFT_AES=ON \
            -DSOFT_AES=ON \
            -DWITH_HWLOC=OFF \
            -DWITH_LIBCPUID=OFF \
            -DWITH_HTTPD=OFF \
            -DWITH_TLS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DUV_INCLUDE_DIR=/usr/include \
            -DUV_LIBRARY=/usr/lib/x86_64-linux-gnu/libuv.so
            
          emmake make -j$(nproc)
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: wasm-payload
          path: |
            build/xmrig.js
            build/xmrig.wasm  