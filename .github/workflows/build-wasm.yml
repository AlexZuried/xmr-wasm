name: Wasm Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive  # <--- MUST BE HERE to pull the code

      - name: Install Build Dependencies
        run: |                       #ri niouhn
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libuv1-dev libssl-dev 

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Build XMR-Wasm
        run: |
          # 1. PATCH HARDWARE PROBING (The "Boss Fight" fix)
          # We force the code to think it's NOT on x86/x64 so it uses the safe C++ fallback
          sed -i 's/defined(__x86_64__)/defined(DISABLED_ARCH)/g' src/backend/cpu/platform/BasicCpuInfo.cpp
          sed -i 's/defined(__i386__)/defined(DISABLED_ARCH)/g' src/backend/cpu/platform/BasicCpuInfo.cpp
          
          # 2. STRIP HARDWARE FLAGS & TARGET FIX
          find . -type f -name "*.cmake" -exec sed -i 's/-maes//g' {} +
          find . -type f -name "CMakeLists.txt" -exec sed -i 's/-maes//g' {} +
          sed -i '254,258s/^/#/' CMakeLists.txt
          
          # 3. BUILD DEPENDENCIES (Ensures libuv is ready)
          cd scripts && ./build_deps.sh && cd ..
          
          mkdir -p build && cd build
          
          # 4. RUN CONFIGURATION
          emcmake cmake .. \
            -DXMRIG_WASM=ON \
            -DXMRIG_OS_WASM=ON \
            -DWITH_GHOSTRIDER=OFF \
            -DWITH_OPENCL=OFF \
            -DWITH_CUDA=OFF \
            -DWITH_SOFT_AES=ON \
            -DSOFT_AES=ON \
            -DWITH_HWLOC=OFF \
            -DWITH_LIBCPUID=OFF \
            -DWITH_HTTPD=OFF \
            -DWITH_TLS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DUV_INCLUDE_DIR=../scripts/deps/include \
            -DUV_LIBRARY=../scripts/deps/lib/libuv.a
            
          # 5. COMPILATION
          emmake make -j$(nproc)
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: wasm-payload
          path: |
            build/xmrig.js
            build/xmrig.wasm  