name: Wasm Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive  # <--- MUST BE HERE to pull the code

      - name: Install Build Dependencies
        run: |                       #ri niouhn
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libuv1-dev libssl-dev 

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Build XMR-Wasm
        run: |
          # 1. THE SURGICAL BYPASS (The 76% Fix)
          # We wrap the entire content of VirtualMemory_unix.cpp in an #ifndef 
          # so the compiler sees an empty file, then we provide a generic flush.
          sed -i '1i #include <cstdlib>' src/crypto/common/VirtualMemory_unix.cpp
          sed -i '2i #ifndef __EMSCRIPTEN__' src/crypto/common/VirtualMemory_unix.cpp
          echo "#endif" >> src/crypto/common/VirtualMemory_unix.cpp
          echo "namespace xmrig { void VirtualMemory::flushInstructionCache(void*, size_t) {} }" >> src/crypto/common/VirtualMemory_unix.cpp

          # 2. FIX BasicCpuInfo (The 64% Fix)
          # We use a similar approach to ensure the namespace is perfect.
          cat <<EOF > src/backend/cpu/platform/BasicCpuInfo.cpp
          #include "backend/cpu/platform/BasicCpuInfo.h"
          namespace xmrig { BasicCpuInfo::BasicCpuInfo() {} }
          EOF

          # 3. STRIP HARDWARE FLAGS
          find . -type f -exec sed -i 's/-maes//g' {} +
          find . -type f -exec sed -i 's/-msse4.1//g' {} +
          find . -type f -name "*.cpp" -o -name "*.h" | xargs sed -i 's/#include <cpuid.h>/\/\/ stripped/g'
          sed -i '254,258s/^/#/' CMakeLists.txt
          
          # 4. BUILD DEPENDENCIES
          cd scripts && ./build_deps.sh && cd ..
          
          # 5. CONFIGURE & BUILD
          mkdir -p build && cd build
          emcmake cmake .. \
            -DXMRIG_WASM=ON \
            -DARM_TARGET=ON \
            -DWITH_GHOSTRIDER=OFF \
            -DWITH_OPENCL=OFF \
            -DWITH_CUDA=OFF \
            -DWITH_SOFT_AES=ON \
            -DSOFT_AES=ON \
            -DWITH_HWLOC=OFF \
            -DWITH_LIBCPUID=OFF \
            -DWITH_HTTPD=OFF \
            -DWITH_TLS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DUV_INCLUDE_DIR=../scripts/deps/include \
            -DUV_LIBRARY=../scripts/deps/lib/libuv.a
            
          emmake make -j$(nproc)
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: wasm-payload
          path: |
            build/xmrig.js
            build/xmrig.wasm  