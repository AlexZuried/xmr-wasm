name: Wasm Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive  # <--- MUST BE HERE to pull the code

      - name: Install Build Dependencies
        run: |                       #ri niouhn
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libuv1-dev libssl-dev 

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Build XMR-Wasm
        run: |
          sudo apt-get update
          sudo apt-get install -y libuv1-dev
          
          # 1. FIX THE CRASH: Move the custom command to the end of the file 
          # or simply bypass the early 'add_custom_command' that causes the error.
          sed -i 's/add_custom_command(TARGET xmrig/add_custom_command(OUTPUT xmrig.js/g' CMakeLists.txt
          
          mkdir -p build && cd build
          
          # 2. Run the configuration
          emcmake cmake .. \
            -DXMRIG_WASM=ON \
            -DXMRIG_PROXY=OFF \
            -DWITH_HWLOC=OFF \
            -DWITH_LIBCPUID=OFF \
            -DWITH_HTTPD=OFF \
            -DWITH_TLS=OFF \
            -DWITH_ADL=OFF \
            -DWITH_NVML=OFF \
            -DWITH_OPENCL=OFF \
            -DWITH_CUDA=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DUV_INCLUDE_DIR=/usr/include \
            -DUV_LIBRARY=/usr/lib/x86_64-linux-gnu/libuv.so
            
          # 3. Start the actual C++ compilation
          emmake make -j2
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: wasm-payload
          path: |
            build/xmrig.js
            build/xmrig.wasm  