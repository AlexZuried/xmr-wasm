name: Wasm Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive  # <--- MUST BE HERE to pull the code

      - name: Install Build Dependencies
        run: |                       #ri niouhn
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libuv1-dev libssl-dev 

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Build XMR-Wasm
        run: |
          # 1. INITIAL FIXES
          sed -i '254,258s/^/#/' CMakeLists.txt
          
          # 2. RUN THE DEPENDENCY SCRIPT FIRST
          # We let it do its thing, even if it creates bad flags
          cd scripts && ./build_deps.sh && cd ..
          
          # 3. THE SCORCHED EARTH CLEANSE
          # We search EVERY file in the entire repository (including generated ones)
          # and delete the -maes flag and x86 intrinsics.
          find . -type f -exec sed -i 's/-maes//g' {} +
          find . -type f -exec sed -i 's/-msse4.1//g' {} +
          find . -type f -name "*.cpp" -o -name "*.h" | xargs sed -i 's/#include <x86intrin.h>/\/\/ stripped/g'
          find . -type f -name "*.cpp" -o -name "*.h" | xargs sed -i 's/#include <immintrin.h>/\/\/ stripped/g'
          find . -type f -name "*.cpp" -o -name "*.h" | xargs sed -i 's/#include <cpuid.h>/\/\/ stripped/g'

          # 4. FIX LLVM.CLEAR_CACHE (The 76% Wall)
          find src/crypto/common -name "VirtualMemory_unix.cpp" -exec sed -i 's/vmsize_t size)/vmsize_t size) { return; } \/\/ /' {} +

          # 5. OVERWRITE BasicCpuInfo (The 64% Wall)
          cat <<EOF > src/backend/cpu/platform/BasicCpuInfo.cpp
          #include "backend/cpu/platform/BasicCpuInfo.h"
          namespace xmrig { BasicCpuInfo::BasicCpuInfo() {} }
          EOF
          
          # 6. FINAL CONFIGURE & BUILD
          mkdir -p build && cd build
          emcmake cmake .. \
            -DXMRIG_WASM=ON \
            -DARM_TARGET=ON \
            -DWITH_GHOSTRIDER=OFF \
            -DWITH_OPENCL=OFF \
            -DWITH_CUDA=OFF \
            -DWITH_SOFT_AES=ON \
            -DSOFT_AES=ON \
            -DWITH_HWLOC=OFF \
            -DWITH_LIBCPUID=OFF \
            -DWITH_HTTPD=OFF \
            -DWITH_TLS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DUV_INCLUDE_DIR=../scripts/deps/include \
            -DUV_LIBRARY=../scripts/deps/lib/libuv.a
            
          emmake make -j$(nproc)
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: wasm-payload
          path: |
            build/xmrig.js
            build/xmrig.wasm  